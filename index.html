<!DOCTYPE html>
<html lang="en">
<head>
    <title> you da real gng </title>
</head>
<body>
<link rel="stylesheet" href="style.css">
<div class="game-container">
    <div class="game-header">
        <h1>cute game</h1>
    </div>

    <div class="turn-indicator">
        <img id="turnIconLeft" class="turn-icon" src="image of a cute rose" alt="turn flower" onerror="this.style.display='none'">
        <span id="turnText" class="turn-text"></span>
        <img id="turnIconRight" class="turn-icon" src="image of cute heart sparkle" alt="cute heart" onerror="this.style.display='none'">
    </div>

     <div class="board" id="board"></div>

    <div class="status-area" id="statusArea">
        <div class="status-message" id="statusMessage">
            <img class="status-img" src="image/rose-flower-cartoon-cute-pink-cartoon-flower-with-adorable-expression-kuNzw8k8_t-removebg-preview.png" alt="leaf" onerror="this.style.display='none'">
            <span id="statusText"></span>
            <img class="status-img" src="image/rose-flower-cartoon-cute-pink-cartoon-flower-with-adorable-expression-kuNzw8k8_t-removebg-preview.png" alt="tiny flower" onerror="this.style.display='none'">
        </div>
    </div>

    <div class="score-panel">
        <div class="score-item">
            <img class="score-icon" src="cute button" alt="X wins icon" onerror="this.style.display='none'">
            <span>🌸 X</span>
            <span class="score-value" id="scoreX">0</span>
        </div>
        <div class="score-item">
            <img class="score-icon" src="cute button" alt="draw icon" onerror="this.style.display='none'">
            <span>🍃 Draw</span>
            <span class="score-value" id="scoreDraw">0</span>
        </div>
        <div class="score-item">
            <img class="score-icon" src="cute button" alt="O wins icon" onerror="this.style.display='none'">
            <span>🌼 O</span>
            <span class="score-value" id="scoreO">0</span>
        </div>
    </div>

    <div class="button-group">
        <button class="cute-btn reset-btn" id="resetBtn">⟳ New Game</button>
        <button class="cute-btn" id="fullResetBtn"> reset score </button>
    </div>
    <footer>♡ lemme knw if u really liked ts or not ♡</footer>
</div>
<script src="script.js"></script>
</body>
</html>
